<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Mestre de Aulas</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { 
            --primary: #2c3e50; --secondary: #27ae60; --danger: #e74c3c; 
            --warning: #f39c12; --blue: #3498db; --whatsapp: #25D366; 
            --purple: #6f42c1; --light: #f8f9fa; --dark-overlay: rgba(0,0,0,0.6);
            --striped: #f4f7f9;
        }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; padding: 15px; color: #333; margin: 0; }
        .container { max-width: 1250px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h2 { color: var(--primary); display: flex; justify-content: space-between; align-items: center; font-size: 1.3rem; flex-wrap: wrap; gap: 10px; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .status-save { font-size: 0.7rem; background: #d4edda; color: #155724; padding: 5px 10px; border-radius: 20px; }

        .card-section { background: var(--light); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .section-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; display: block; color: var(--primary); }

        .form-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        .input-block { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.8rem; font-weight: bold; color: var(--primary); }
        
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; width: 100%; box-sizing: border-box; color: #000 !important; }

        /* CORREÇÃO DO NÚMERO CORTADO */
        #cortesia { 
            width: 35px !important; 
            height: auto !important;
            min-height: unset !important;
            padding: 0 !important;
            margin: 0 !important;
            text-align: center; 
            border: none !important; 
            font-weight: bold; 
            color: #000 !important; 
            background: transparent !important;
            outline: none !important;
        }

        .search-container { margin: 20px 0 10px 0; }
        .search-input { padding: 12px 15px; width: 100%; border-radius: 8px; border: 2px solid #ddd; font-size: 1rem; box-sizing: border-box; }

        .table-container { overflow-x: auto; margin-top: 10px; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 900px; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; }
        td { border-bottom: 1px solid #eee; padding: 10px; vertical-align: middle; transition: background 0.2s; color: #333; }
        
        tbody tr:nth-child(even) { background-color: var(--striped); }
        tbody tr:hover { background-color: #ebf5fb; }

        button { border: none; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.2s; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-add { background: var(--secondary); width: 100%; grid-column: 1 / -1; padding: 12px; font-size: 1rem; margin-top: 5px; }
        .btn-action { padding: 8px 10px; min-width: 35px; font-size: 0.9rem; }
        .btn-check { background: var(--secondary); }
        .btn-undo { background: var(--warning); }
        .btn-edit-val { background: none; color: var(--blue); padding: 2px 5px; font-size: 0.7rem; border: 1px dashed var(--blue); margin-top: 4px; display: block; }
        
        .footer-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 2px solid #eee; }
        .btn-excel { background: var(--blue); padding: 12px; }
        .btn-ws-out { background: var(--whatsapp); padding: 12px; }
        .btn-clear-all { background: var(--danger); padding: 12px; }
        .summary { margin: 20px 0 10px 0; padding: 15px; background: var(--primary); color: white; border-radius: 8px; text-align: right; font-weight: bold; font-size: 1.1rem; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-overlay); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 15px; box-sizing: border-box; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; max-width: 400px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

        .qty-control { display: flex; align-items: center; gap: 2px; background: white; border: 1px solid #ddd; border-radius: 6px; padding: 4px; width: fit-content; min-width: 90px; justify-content: center; }
        .qty-control span { color: #000 !important; font-weight: bold; min-width: 25px; text-align: center; }
        .btn-qty { color: #333; background: #eee; border: none; width: 25px; height: 25px; border-radius: 4px; cursor: pointer; font-size: 1.1rem; line-height: 1; }
        .btn-qty:hover { background: #ddd; }

        small { color: #666; font-size: 0.75rem; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>
        Gestão de Aulas
        <span class="status-save" id="saveStatus">Sistema Ativo</span>
    </h2>
    
    <div class="card-section" style="background: #fff;">
        <span class="section-title">👤 Adicionar Aluno</span>
        <div class="form-container">
            <div class="input-block">
                <label>Nome do Aluno</label>
                <input type="text" id="nome" placeholder="Ex: João">
            </div>
            <div class="input-block">
                <label>Valor Pago (R$)</label>
                <input type="number" id="valorPago" placeholder="0.00">
            </div>
            <div class="input-block">
                <label>Data do Pgto</label>
                <input type="date" id="dataPgto">
            </div>
            <div class="input-block">
                <label>R$ por Aula</label>
                <input type="number" id="valorAula" value="25">
            </div>
            <div class="input-block">
                <label>Aulas Free</label>
                <div class="qty-control">
                    <button class="btn-qty" onclick="changeInputQty('cortesia', -1)">-</button>
                    <input type="number" id="cortesia" value="0" readonly>
                    <button class="btn-qty" onclick="changeInputQty('cortesia', 1)">+</button>
                </div>
            </div>
            <button class="btn-add" onclick="adicionarAluno()">+ Cadastrar Aluno</button>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="buscaInput" class="search-input" placeholder="🔍 Buscar aluno por nome..." onkeyup="atualizarTabela()">
    </div>

    <div class="table-container">
        <table id="tabelaAlunos">
            <thead>
                <tr>
                    <th>Aluno</th>
                    <th>Pagamento</th>
                    <th>Aulas Free</th>
                    <th>Saldo</th>
                    <th>Última Aula</th>
                    <th>Presença</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="summary" id="resumoFinanceiro">Total Arrecadado: R$ 0,00</div>

    <div class="footer-actions">
        <button class="btn-excel" onclick="exportarExcel()">📊 Excel</button>
        <button class="btn-ws-out" onclick="enviarWhatsapp()">📲 WhatsApp Backup</button>
        <button class="btn-clear-all" onclick="confirmarLimparTudo()">🗑️ Apagar Tudo</button>
    </div>
</div>

<div id="modalApp" class="modal-overlay">
    <div class="modal-content">
        <div id="modalHeader" style="font-weight:bold; font-size:1.1rem; margin-bottom:15px; color: #333;">Título</div>
        <div id="modalBody" style="color: #333;">Corpo</div>
        <div class="modal-footer" id="modalFooter"></div>
    </div>
</div>

<script>
    let alunos = [];
    let indexTemp = null;

    document.getElementById('dataPgto').valueAsDate = new Date();

    window.onload = () => {
        const dados = localStorage.getItem('meusAlunos');
        if (dados) {
            alunos = JSON.parse(dados);
            atualizarTabela();
        }
    };

    function openModal(titulo, corpoHTML, botoes) {
        document.getElementById('modalHeader').innerText = titulo;
        document.getElementById('modalBody').innerHTML = corpoHTML;
        const footer = document.getElementById('modalFooter');
        footer.innerHTML = '';
        botoes.forEach(btn => {
            const b = document.createElement('button');
            b.innerText = btn.label;
            b.style.background = btn.color || '#95a5a6';
            b.style.padding = '8px 15px';
            b.onclick = () => { if(btn.action) btn.action(); closeModal(); };
            footer.appendChild(b);
        });
        document.getElementById('modalApp').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalApp').style.display = 'none'; }

    function formatDate(dateStr) {
        if(!dateStr) return "-";
        const d = new Date(dateStr + 'T12:00:00');
        return d.toLocaleDateString('pt-BR');
    }

    function atualizarTabela() {
        const tbody = document.querySelector('#tabelaAlunos tbody');
        const termoBusca = document.getElementById('buscaInput').value.toLowerCase();
        let total = 0;
        tbody.innerHTML = '';
        
        alunos.sort((a, b) => a.nome.localeCompare(b.nome));

        alunos.forEach((a, idx) => {
            total += a.valorPago;
            if (a.nome.toLowerCase().includes(termoBusca)) {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${a.nome}</strong></td>
                        <td>
                            R$ ${a.valorPago.toFixed(2)}
                            <small>${formatDate(a.dataPgto)}</small>
                            <button class="btn-edit-val" onclick="abrirEdicao(${idx})">Editar</button>
                        </td>
                        <td>
                            <div class="qty-control" style="min-width: unset;">
                                <button class="btn-qty" onclick="changeFreeTable(${idx}, -1)">-</button>
                                <span>${a.cortesia}</span>
                                <button class="btn-qty" onclick="changeFreeTable(${idx}, 1)">+</button>
                            </div>
                        </td>
                        <td><b style="color: ${a.restantes === 0 ? 'var(--danger)' : 'var(--secondary)'}">${a.restantes} aulas</b></td>
                        <td>${formatDate(a.ultimaAula)}</td>
                        <td>
                            <div style="display:flex; gap:5px;">
                                <button class="btn-action btn-check" title="Marcar Presença" onclick="abrirModalPresenca(${idx})">✅</button>
                                <button class="btn-action btn-undo" title="Desfazer Última" onclick="gerenciarPresenca(${idx}, 'sub')">↩️</button>
                            </div>
                        </td>
                        <td>
                            <button class="btn-action" style="background:var(--danger)" onclick="confirmarRemover(${idx})">🗑️</button>
                        </td>
                    </tr>`;
            }
        });
        document.getElementById('resumoFinanceiro').innerText = `Total Arrecadado: R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        localStorage.setItem('meusAlunos', JSON.stringify(alunos));
    }

    function adicionarAluno() {
        const nome = document.getElementById('nome').value;
        const valorPago = parseFloat(document.getElementById('valorPago').value);
        const dataPgto = document.getElementById('dataPgto').value;
        const valorAula = parseFloat(document.getElementById('valorAula').value) || 25;
        const cortesia = parseInt(document.getElementById('cortesia').value) || 0;

        if (!nome || isNaN(valorPago)) {
            openModal("Erro", "Preencha nome e valor.", [{label: "Ok"}]);
            return;
        }

        alunos.push({ 
            id: Date.now(), nome, valorPago, dataPgto, valorAula, cortesia, 
            restantes: Math.floor(valorPago / valorAula) + cortesia,
            ultimaAula: null
        });
        
        document.getElementById('buscaInput').value = ''; 
        atualizarTabela();
        limparCampos();
    }

    function abrirModalPresenca(index) {
        if(alunos[index].restantes <= 0) {
            openModal("Saldo Esgotado", "O aluno não possui mais aulas.", [{label: "Ok"}]);
            return;
        }
        indexTemp = index;
        const hoje = new Date().toISOString().split('T')[0];
        const html = `
            <label style="color: #333">Data da Aula:</label>
            <input type="date" id="dataPresencaInput" value="${hoje}" style="margin-top:10px; padding: 10px; width: 100%; box-sizing: border-box; color: #333;">
        `;
        openModal("Marcar Presença", html, [
            { label: "Cancelar" },
            { label: "Confirmar ✅", color: 'var(--secondary)', action: salvarPresenca }
        ]);
    }

    function salvarPresenca() {
        const data = document.getElementById('dataPresencaInput').value;
        alunos[indexTemp].restantes--;
        alunos[indexTemp].ultimaAula = data;
        atualizarTabela();
    }

    function abrirEdicao(index) {
        indexTemp = index;
        const a = alunos[index];
        const html = `
            <label style="color: #333">Valor Pago (R$):</label>
            <input type="number" id="editVal" value="${a.valorPago}" step="0.01" style="margin-bottom:10px; padding:10px; width:100%; box-sizing:border-box; color: #333;">
            <label style="color: #333">Data Pagamento:</label>
            <input type="date" id="editData" value="${a.dataPgto}" style="padding:10px; width:100%; box-sizing:border-box; color: #333;">
        `;
        openModal("Editar Pagamento", html, [
            { label: "Cancelar" },
            { label: "Salvar", color: 'var(--blue)', action: () => {
                const nv = parseFloat(document.getElementById('editVal').value);
                const nd = document.getElementById('editData').value;
                const aulasUsadas = (Math.floor(a.valorPago / a.valorAula) + a.cortesia) - a.restantes;
                a.valorPago = nv;
                a.dataPgto = nd;
                const novoTotal = Math.floor(nv / a.valorAula) + a.cortesia;
                a.restantes = Math.max(0, novoTotal - aulasUsadas);
                atualizarTabela();
            }}
        ]);
    }

    function changeInputQty(id, delta) {
        const i = document.getElementById(id);
        i.value = Math.max(0, parseInt(i.value) + delta);
    }

    function changeFreeTable(index, delta) {
        const novo = Math.max(0, alunos[index].cortesia + delta);
        if (novo !== alunos[index].cortesia) {
            alunos[index].cortesia = novo;
            alunos[index].restantes += delta;
            atualizarTabela();
        }
    }

    function gerenciarPresenca(index, acao) {
        if (acao === 'sub') {
            const max = Math.floor(alunos[index].valorPago / alunos[index].valorAula) + alunos[index].cortesia;
            if (alunos[index].restantes < max) {
                alunos[index].restantes++;
                atualizarTabela();
            }
        }
    }

    function confirmarRemover(index) {
        openModal("Excluir", `Remover ${alunos[index].nome}?`, [
            { label: "Não" },
            { label: "Excluir", color: 'var(--danger)', action: () => { alunos.splice(index, 1); atualizarTabela(); } }
        ]);
    }

    function confirmarLimparTudo() {
        openModal("⚠️ Cuidado", "Isso apagará todos os registros. Continuar?", [
            { label: "Cancelar" },
            { label: "Limpar Tudo", color: 'var(--danger)', action: () => { alunos = []; localStorage.clear(); atualizarTabela(); } }
        ]);
    }

    function enviarWhatsapp() {
        const msg = `*BACKUP GESTÃO*\n\`\`\`${JSON.stringify(alunos)}\`\`\``;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function exportarExcel() {
        const dados = alunos.map(a => ({ "Nome": a.nome, "Valor": a.valorPago, "Pgto": a.dataPgto, "Restantes": a.restantes, "UltAula": a.ultimaAula }));
        const ws = XLSX.utils.json_to_sheet(dados);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Alunos");
        XLSX.writeFile(wb, "gestao_aulas.xlsx");
    }

    function limparCampos() { 
        document.getElementById('nome').value = ''; 
        document.getElementById('valorPago').value = ''; 
        document.getElementById('cortesia').value = '0';
        document.getElementById('dataPgto').valueAsDate = new Date();
    }
</script>
</body>
</html>
